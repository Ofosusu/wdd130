<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | David Ofosu Amoah's Rafting Company</title>
    <meta name="description"
      content="Get in touch with David Ofosu Amoah's Rafting Company. Find our location, phone number, email, and send us a message for reservations or inquiries.">
    <meta name="author" content="David Ofosu Amoah">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>

        <div class="logo">
            <img id="logo" src="images/water.png" alt="rafting logo">
        </div>

        <nav>
            <ul class="navigation">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>

    </header>

    <main>


        <div class="company-info">
            <h1>David Ofosu Amoah's Rafting Company</h1>
            <p>123 River Road</p>
            <p>Volta Region, Ghana</p>
            <p>+233 20 123 4567</p>
            <p>info@davidraftingghana.com</p>
        </div>

        <section class="contact-layout">

            <iframe title="Our Location"
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d127323.46!2d-0.2057!3d6.5964!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xfdf9084b2d34a3f%3A0xd3f4b5e4c6e9b8f0!2sVolta%20River%2C%20Ghana!5e0!3m2!1sen!2sgh!4v1680000000000!5m2!1sen!2sgh"
              allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade">
            </iframe>

            <form action="#" method="post">

                <div class="form-row">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Placeholder">
                </div>

                <div class="form-row">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Placeholder">
                </div>

                <div class="form-row">
                    <label>Message Purpose</label>
                    <div class="radio-options">
                        <label><input type="radio" id="general" name="purpose" value="general"
                              checked> General Inquiry</label>
                        <label><input type="radio" id="reservation" name="purpose"
                              value="reservation"> Reservation Question</label>
                        <label><input type="radio" id="website" name="purpose" value="website">
                            Website Suggestion</label>
                    </div>
                </div>

                <div class="form-row">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" placeholder="Type here"></textarea>
                </div>

                <label class="subscribe">
                    <input type="checkbox" id="subscribe" name="subscribe"> Please Subscribe me to
                    the monthly newsletter
                </label>

                <button type="submit">Get in Touch!</button>

            </form>

        </section>

        <section class="employees">
            <h2>We Are Here to Serve You</h2>

            <div class="employee-grid">

                <figure>
                    <img src="images/ama.jpeg" alt="madam ama">
                    <figcaption>Employee Profile</figcaption>
                </figure>

                <figure>
                    <img src="images/kofi.jpeg" alt="Mr kofi">
                    <figcaption>Employee Profile</figcaption>
                </figure>

                <figure>
                    <img src="images/kwame.jpeg" alt="Mr kwame">
                    <figcaption>Employee Profile</figcaption>
                </figure>

            </div>
        </section>

    </main>

    <footer>
        <p>
            © copyright 💧 2026 💧 David Ofosu Amoah rafting company.
        </p>
        <nav class="socialmedia">
            <a href="http://facebook.com">
                <img src="images/facebook.svg" alt="Facebook Icon">
            </a>
            <a href="http://instagram.com">
                <img src="images/instagram.svg" alt="instagram Icon">
            </a>
            <a href="http://youtube.com">
                <img src="images/youtube.svg" alt="youtube Icon">
            </a>
        </nav>
    </footer>

</body>

</html>
